<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Планер</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #1E1A14;
  --surface: #2A2419;
  --card:    #332C1F;
  --border:  #4A4030;
  --text:    #E8DCC8;
  --muted:   #8A7D68;
  --accent:  #C8965A;
  --today-bg: rgba(200,150,90,0.12);
}

html, body { height: 100%; }
body {
  font-family: 'Jost', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-weight: 300;
  min-height: 100vh;
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.6rem 2.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.7rem;
  font-weight: 300;
  color: var(--accent);
  letter-spacing: 0.08em;
}
.month-nav {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.month-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem;
  font-weight: 300;
  color: var(--text);
  letter-spacing: 0.08em;
  min-width: 180px;
  text-align: center;
}
.nav-arrow {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  width: 32px; height: 32px;
  cursor: pointer;
  color: var(--accent);
  font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.nav-arrow:hover { background: var(--card); }

/* DIAGRAMS */
.diagrams {
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 2rem 3rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  gap: 1rem;
}
.diag-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.9rem;
  flex: 1;
}
.diag-ring { position: relative; width: 120px; height: 120px; flex-shrink: 0; }
.diag-ring svg { transform: rotate(-90deg); }
.ring-track { fill: none; stroke: var(--border); stroke-width: 8; }
.ring-fill  { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease, stroke 0.6s ease; }
.diag-inner {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px;
}
.diag-pct {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  font-weight: 300;
  line-height: 1;
  transition: color 0.6s ease;
}
.diag-info { text-align: center; }
.diag-title {
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.25rem;
}
.diag-sub {
  font-size: 0.78rem;
  color: var(--text);
}
.diag-sep {
  width: 1px;
  height: 80px;
  background: var(--border);
}

/* TABLE */
.table-wrap {
  overflow-x: auto;
  padding: 1.8rem 2.5rem 2.5rem;
}
table { border-collapse: collapse; width: max-content; min-width: 100%; }
.col-task { min-width: 200px; width: 200px; }
.col-day  { width: 32px; min-width: 32px; }

thead th {
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 400;
  padding-bottom: 0.7rem;
  text-align: center;
}
thead th.col-task { text-align: left; padding-left: 0; padding-right: 1rem; }

.day-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.9rem;
  font-weight: 300;
  color: var(--text);
  line-height: 1.2;
}
.day-dow { font-size: 0.52rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
th.today-col .day-num { color: var(--accent); font-weight: 400; }

tbody tr { border-top: 1px solid var(--border); }
tbody tr:last-child { border-bottom: 1px solid var(--border); }
td { padding: 0.42rem 0; vertical-align: middle; }
td.col-task { padding-right: 1.2rem; }

.task-cell { display: flex; align-items: center; gap: 0.5rem; }
.task-name {
  flex: 1; font-size: 0.84rem; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px;
}
.task-del {
  background: none; border: none; color: var(--border);
  cursor: pointer; font-size: 1rem; line-height: 1;
  padding: 0 2px; flex-shrink: 0;
  transition: color 0.15s; opacity: 0;
}
tbody tr:hover .task-del { opacity: 1; }
.task-del:hover { color: var(--accent); }

.check-cell { text-align: center; }
.check-dot {
  width: 20px; height: 20px;
  border: 1.5px solid var(--border);
  border-radius: 50%; margin: 0 auto;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.check-dot.on { border-color: transparent; }
.check-dot.on::after { content: ''; width: 7px; height: 7px; background: rgba(0,0,0,0.35); border-radius: 50%; }

td.today-col, th.today-col { background: var(--today-bg); }

/* ADD ROW */
.add-row td { padding-top: 0.9rem; border-top: none; }
.add-row { border-top: none !important; }
.add-form { display: flex; gap: 0.4rem; }
.add-input {
  flex: 1; background: var(--surface);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 0.45rem 0.7rem;
  font-family: 'Jost', sans-serif; font-size: 0.82rem; font-weight: 300;
  color: var(--text); outline: none; transition: border-color 0.15s;
}
.add-input::placeholder { color: var(--muted); }
.add-input:focus { border-color: var(--accent); }
.add-btn {
  background: var(--accent); border: none; border-radius: 6px;
  color: var(--bg); font-size: 1.1rem;
  width: 30px; height: 30px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s; flex-shrink: 0;
}
.add-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<header>
  <div class="logo">Планер</div>
  <div class="month-nav">
    <button class="nav-arrow" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="month-label"></div>
    <button class="nav-arrow" onclick="changeMonth(1)">›</button>
  </div>
</header>

<div class="diagrams">
  <div class="diag-block">
    <div class="diag-ring">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle class="ring-track" cx="60" cy="60" r="50"/>
        <circle class="ring-fill" id="d-day" cx="60" cy="60" r="50"
          stroke-dasharray="314.2" stroke-dashoffset="314.2" stroke="#e03a2f"/>
      </svg>
      <div class="diag-inner">
        <span class="diag-pct" id="pct-day" style="color:#e03a2f">0%</span>
      </div>
    </div>
    <div class="diag-info">
      <div class="diag-title">Сегодня</div>
      <div class="diag-sub" id="sub-day">0 из 0 задач</div>
    </div>
  </div>

  <div class="diag-sep"></div>

  <div class="diag-block">
    <div class="diag-ring">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle class="ring-track" cx="60" cy="60" r="50"/>
        <circle class="ring-fill" id="d-week" cx="60" cy="60" r="50"
          stroke-dasharray="314.2" stroke-dashoffset="314.2" stroke="#e03a2f"/>
      </svg>
      <div class="diag-inner">
        <span class="diag-pct" id="pct-week" style="color:#e03a2f">0%</span>
      </div>
    </div>
    <div class="diag-info">
      <div class="diag-title">Неделя</div>
      <div class="diag-sub" id="sub-week">0 из 0</div>
    </div>
  </div>

  <div class="diag-sep"></div>

  <div class="diag-block">
    <div class="diag-ring">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle class="ring-track" cx="60" cy="60" r="50"/>
        <circle class="ring-fill" id="d-month" cx="60" cy="60" r="50"
          stroke-dasharray="314.2" stroke-dashoffset="314.2" stroke="#e03a2f"/>
      </svg>
      <div class="diag-inner">
        <span class="diag-pct" id="pct-month" style="color:#e03a2f">0%</span>
      </div>
    </div>
    <div class="diag-info">
      <div class="diag-title">Месяц</div>
      <div class="diag-sub" id="sub-month">0 из 0</div>
    </div>
  </div>
</div>

<div class="table-wrap">
  <table id="main-table">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const CIRC = 314.2;
const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DOWS = ['вс','пн','вт','ср','чт','пт','сб'];

const now = new Date();
let curYear = now.getFullYear();
let curMonth = now.getMonth();
let tasks = [];
let checks = {};
let nextId = 1;

// Color gradient: red → orange → amber → yellow-green → green
function pctToColor(pct) {
  const stops = [
    { p: 0,   r: 224, g: 58,  b: 47  },  // red
    { p: 20,  r: 220, g: 100, b: 30  },  // dark orange
    { p: 40,  r: 220, g: 148, b: 30  },  // amber
    { p: 60,  r: 210, g: 190, b: 40  },  // yellow
    { p: 80,  r: 140, g: 190, b: 50  },  // yellow-green
    { p: 100, r: 72,  g: 175, b: 75  },  // green
  ];
  if (pct <= 0) return `rgb(${stops[0].r},${stops[0].g},${stops[0].b})`;
  if (pct >= 100) return `rgb(${stops[stops.length-1].r},${stops[stops.length-1].g},${stops[stops.length-1].b})`;
  let lo = stops[0], hi = stops[stops.length-1];
  for (let i = 0; i < stops.length - 1; i++) {
    if (pct >= stops[i].p && pct <= stops[i+1].p) { lo = stops[i]; hi = stops[i+1]; break; }
  }
  const t = (pct - lo.p) / (hi.p - lo.p);
  const r = Math.round(lo.r + (hi.r - lo.r) * t);
  const g = Math.round(lo.g + (hi.g - lo.g) * t);
  const b = Math.round(lo.b + (hi.b - lo.b) * t);
  return `rgb(${r},${g},${b})`;
}

function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }

function changeMonth(d) {
  curMonth += d;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  render();
}

function addTask() {
  const inp = document.getElementById('add-input');
  const name = inp.value.trim();
  if (!name) return;
  tasks.push({ id: nextId++, name });
  inp.value = '';
  render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  Object.keys(checks).forEach(k => { if (k.startsWith(id + '_')) delete checks[k]; });
  render();
}

function toggle(taskId, day) {
  const key = taskId + '_' + day;
  checks[key] = !checks[key];
  render();
}

function isChecked(taskId, day) { return !!checks[taskId + '_' + day]; }

function render() {
  const days = daysInMonth(curYear, curMonth);
  const todayD = (now.getFullYear() === curYear && now.getMonth() === curMonth) ? now.getDate() : -1;

  document.getElementById('month-label').textContent = MONTHS[curMonth] + ' ' + curYear;

  // thead
  let hRow = '<tr><th class="col-task"></th>';
  for (let d = 1; d <= days; d++) {
    const dow = new Date(curYear, curMonth, d).getDay();
    const isTod = d === todayD;
    hRow += `<th class="col-day${isTod?' today-col':''}">
      <div class="day-num">${d}</div>
      <div class="day-dow">${DOWS[dow]}</div>
    </th>`;
  }
  hRow += '</tr>';
  document.getElementById('thead').innerHTML = hRow;

  // tbody
  let rows = '';
  tasks.forEach(task => {
    rows += `<tr><td class="col-task"><div class="task-cell">
      <span class="task-name" title="${task.name}">${task.name}</span>
      <button class="task-del" onclick="deleteTask(${task.id})">×</button>
    </div></td>`;
    for (let d = 1; d <= days; d++) {
      const on = isChecked(task.id, d);
      const isTod = d === todayD;
      rows += `<td class="check-cell col-day${isTod?' today-col':''}">
        <div class="check-dot${on?' on':''}" 
          style="${on ? 'background:'+dotColor(task.id,d)+';border-color:'+dotColor(task.id,d) : ''}"
          onclick="toggle(${task.id},${d})"></div>
      </td>`;
    }
    rows += '</tr>';
  });

  rows += `<tr class="add-row">
    <td class="col-task"><div class="add-form">
      <input class="add-input" id="add-input" placeholder="Добавить задачу..."
        onkeydown="if(event.key==='Enter')addTask()">
      <button class="add-btn" onclick="addTask()">+</button>
    </div></td>
    <td colspan="${days}"></td>
  </tr>`;

  document.getElementById('tbody').innerHTML = rows;
  updateDiagrams(days, todayD);
}

function dotColor(taskId, day) {
  // use accent as fixed dot color — diagrams carry the gradient
  return 'var(--accent)';
}

function updateDiagrams(days, todayD) {
  const total = tasks.length;

  // today
  const todayDone = todayD > 0 ? tasks.filter(t => isChecked(t.id, todayD)).length : 0;
  setDiag('day', todayDone, total, `${todayDone} из ${total} задач`);

  // week
  let weekDone = 0, weekTotal = 0;
  if (todayD > 0) {
    const dow = new Date(curYear, curMonth, todayD).getDay();
    const mondayOffset = (dow === 0 ? 6 : dow - 1);
    const weekStart = todayD - mondayOffset;
    for (let d = Math.max(1, weekStart); d <= Math.min(days, weekStart + 6); d++) {
      tasks.forEach(t => { weekTotal++; if (isChecked(t.id, d)) weekDone++; });
    }
  }
  setDiag('week', weekDone, weekTotal, `${weekDone} из ${weekTotal}`);

  // month
  let mDone = 0, mTotal = 0;
  for (let d = 1; d <= days; d++) {
    tasks.forEach(t => { mTotal++; if (isChecked(t.id, d)) mDone++; });
  }
  setDiag('month', mDone, mTotal, `${mDone} из ${mTotal}`);
}

function setDiag(id, done, total, sub) {
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  const offset = CIRC - (CIRC * pct / 100);
  const color = pctToColor(pct);
  const el = document.getElementById('d-' + id);
  el.style.strokeDashoffset = offset;
  el.setAttribute('stroke', color);
  const pctEl = document.getElementById('pct-' + id);
  pctEl.textContent = pct + '%';
  pctEl.style.color = color;
  document.getElementById('sub-' + id).textContent = sub;
}

render();
</script>
</body>
</html>
